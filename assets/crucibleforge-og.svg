      <stop offset="70%" stop-color="#8B5A2B" stop-opacity="0.015"/>
      <stop offset="100%" stop-color="#08060E" stop-opacity="0"/>
    </radialGradient>
    <filter id="gl">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
