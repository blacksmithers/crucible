    </style>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5A2B"/>
      <stop offset="50%" stop-color="#B08D57"/>
      <stop offset="100%" stop-color="#D4A574"/>
    </linearGradient>
    <radialGradient id="ring-outer" cx="35%" cy="35%" r="70%">
      <stop offset="0.5" stop-color="#5C3317"/>
      <stop offset="1" stop-color="#2D1809"/>
    </radialGradient>
    <radialGradient id="ring-inner" cx="35%" cy="35%" r="70%">
